name: skillbridge_ai
description: "SkillBridge AI — AI-powered career growth app for students and junior developers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.5

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4
  firebase_crashlytics: ^4.0.4
  firebase_performance: ^0.10.0+8
  google_sign_in: ^6.2.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Payments
  # Pinned below 11.5 — stripe_platform_interface 11.5+ uses dart:ui Color's
  # .r/.g/.b/.a getters, which don't exist until Flutter 3.27+ (this project
  # is on Flutter 3.22.1). Bump once the Flutter SDK here is upgraded.
  flutter_stripe: ">=10.1.1 <11.5.0"

  # UI / design system
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  animations: ^2.0.11
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  file_picker: ^8.0.6
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  flutter_dotenv: ^5.1.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

# stripe_platform_interface 11.5.0+ uses dart:ui Color's .r/.g/.b/.a getters,
# which don't exist until Flutter 3.27+ (this project is on Flutter 3.22.1).
# flutter_stripe's own caret constraint still allows 11.5.0 transitively, so
# pin the platform interface directly. Remove this override once the Flutter
# SDK here is upgraded past 3.27.
dependency_overrides:
  stripe_platform_interface: 11.4.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/app_logo_highres.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/app_logo_foreground.png"

flutter_native_splash:
  color: "#0F172A"
  image: "assets/images/app_logo_highres.png"
  android_12:
    color: "#0F172A"
    image: "assets/images/app_logo_highres.png"
