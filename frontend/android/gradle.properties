# Capped for an 8GB-RAM dev machine — the emulator alone uses ~1.3GB, so
# Gradle can't be allowed to claim 4GB (the previous default) on top of
# that plus a separate Kotlin daemon. Raise this only on a higher-RAM machine.
org.gradle.jvmargs=-Xmx1536M -XX:MaxMetaspaceSize=512m
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.caching=true
# Runs Kotlin compilation inside the Gradle daemon's own JVM instead of a
# separate out-of-process Kotlin daemon — one less JVM competing for RAM.
kotlin.compiler.execution.strategy=in-process
android.useAndroidX=true
android.enableJetifier=true
